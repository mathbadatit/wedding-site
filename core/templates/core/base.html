<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Organizzazione matrimoni eleganti in location da sogno">
  <title>{% block title %}Wedding{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="icon" href="{% static 'images/favicon.ico' %}">
  <script async src="https://www.googletagmanager.com/gtag/js?id=UA-XXXXXXX-X"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'UA-XXXXXXX-X');
  </script>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <header>
    <img src="{% static 'images/logo.svg' %}" alt="Logo">
    <nav>
      <a href="{% url 'home' %}">{% trans "Home" %}</a>
      <a href="{% url 'services' %}">{% trans "Servizi" %}</a>
      <a href="{% url 'gallery' %}">{% trans "Galleria" %}</a>
      <a href="{% url 'contact' %}">{% trans "Contattaci" %}</a>
    </nav>
  </header>

  {% block content %}{% endblock %}

  <footer>
    <p>&copy; 2025 Wedding Company</p>
    <a href="{% url 'privacy' %}">{% trans "Privacy" %}</a>
    <a href="{% url 'cookie' %}">{% trans "Cookie" %}</a>
  </footer>

  <!-- Cookie Banner -->
  <div id="cookie-banner">
    <p>Questo sito usa cookie per migliorare l’esperienza utente.</p>
    <button onclick="document.getElementById('cookie-banner').style.display='none'">Accetta</button>
  </div>
</body>
</html>
