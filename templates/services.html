{% extends "base.html" %}
{% block content %}
<section class="page-header">
  <h1>{{ _('Servizi offerti') }}</h1>
</section>

<section class="services-section">
  <div class="services-grid">
    {% for s in services %}
    <div class="service-card">
      <h3>{{ s.title }}</h3>
      <p>{{ s.description }}</p>
    </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
