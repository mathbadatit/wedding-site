{% extends "base.html" %}
{% block title %}{{ _('Contatti') }}{% endblock %}

{% block content %}
<h2>{{ _('Contattaci') }}</h2>
<div class="form-box">
  <form id="contactForm">
    <label>{{ _('Nome') }}</label>
    <input type="text" name="nome" required>

    <label>{{ _('Email') }}</label>
    <input type="email" name="email" required>

    <label>{{ _('Messaggio') }}</label>
    <textarea name="messaggio" rows="5" required></textarea>

    <input type="hidden" id="recaptchaToken" name="recaptchaToken">
    <button class="btn" type="submit">{{ _('Invia messaggio') }}</button>
    <div id="contactMsg"></div>
  </form>
</div>
{% endblock %}
