{% extends 'base.html' %}
{% block title %}{{ _('Prenota il tuo matrimonio') }}{% endblock %}

{% block content %}
<div class="form-box fade-in">
  <h2>{{ _('Prenotazione') }}</h2>
  <form id="bookingForm">
    <label>{{ _('Nome') }}</label>
    <input name="nome" required>

    <label>{{ _('Email') }}</label>
    <input type="email" name="email" required>

    <label>{{ _('Telefono') }}</label>
    <input name="telefono">

    <label>{{ _('Data del matrimonio') }}</label>
    <input type="date" name="data" required>

    <label>{{ _('Location desiderata') }}</label>
    <input name="location">

    <label>{{ _('Budget indicativo') }}</label>
    <input name="budget">

    <input type="hidden" name="recaptchaToken" id="recaptchaToken">
    <button type="submit" class="btn">{{ _('Prenota ora') }}</button>
    <div id="bookingMsg"></div>
  </form>
</div>
{% endblock %}
