<div class="container-fluid">
  <div class="row">
    <div class="col-md-6">
      <img src="{{ url_for('static', filename='uploads/' ~ service.image_filename) }}" alt="{{ service.title }}" class="img-fluid">
    </div>
    <div class="col-md-6">
      <h3>{{ service.title }}</h3>
      <p><strong>Categoria:</strong> {{ service.category }}</p>
      <p>{{ service.description }}</p>
    </div>
  </div>
</div>
