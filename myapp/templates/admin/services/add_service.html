{% extends "base.html" %}
{% block content %}
<h2>Aggiungi Servizio</h2>
<form method="POST">
  <div class="form-group">
    <input type="text" name="title" placeholder="Titolo" required>
  </div>
  <div class="form-group">
    <textarea name="description" placeholder="Descrizione" rows="4" required></textarea>
  </div>
  <button class="btn" type="submit">Salva</button>
</form>
{% endblock %}
