<!-- myapp/templates/admin/partials/tab_collaborators.html -->
<table class="table">
  <thead>
    <tr>
      <th>Nome</th>
      <th>Categoria</th>
      <th>Descrizione</th>
      <th>Azioni</th>
    </tr>
  </thead>
  <tbody>
    {% for collaborator in collaborators %}
    <tr>
      <td>{{ collaborator.name }}</td>
      <td>{{ collaborator.category }}</td>
      <td>{{ collaborator.description }}</td>
      <td>
        <a href="{{ url_for('main.collaborator_edit', collab_id=collaborator.id) }}" class="btn btn-sm btn-warning">Modifica</a>
        <form action="{{ url_for('main.collaborator_delete', collab_id=collaborator.id) }}" method="post" style="display:inline-block;">
          <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Sei sicuro?')">Elimina</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
