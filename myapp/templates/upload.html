{% extends "base.html" %}
{% block title %}{{ _('Carica immagine') }}{% endblock %}

{% block content %}
<h2>{{ _('Carica una nuova immagine') }}</h2>

<form method="POST" enctype="multipart/form-data">
  <label for="file">{{ _('Seleziona immagine') }}:</label><br>
  <input type="file" name="file" required><br><br>

  <label for="caption">{{ _('Descrizione (opzionale)') }}:</label><br>
  <input type="text" name="caption"><br><br>

  <button type="submit" class="btn">{{ _('Carica') }}</button>
</form>
{% endblock %}
